name: Build Android test APK

# Builds a standalone, sideloadable Android APK for internal testing.
# No Expo account, no Play Console, no secrets required — the APK is built with
# Gradle on GitHub's runners and signed with a debug key (fine for internal
# testing, NOT for public store release).
#
# How to use:
#   Actions tab -> "Build Android test APK" -> Run workflow -> pick the branch
#   to build (default: main) -> Run.
#   When it finishes, download the "budgetvault-apk" artifact from the run
#   summary, transfer it to an Android phone, and install (allow "install from
#   unknown sources"). Optionally tick "publish_release" to also attach the APK
#   to a GitHub Release you can share a link to.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build'
        required: true
        default: 'main'
      publish_release:
        description: 'Also publish the APK to a GitHub Release'
        type: boolean
        required: false
        default: false

permissions:
  contents: write   # needed only when publish_release is true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: budgetvault
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK (debug-signed)
        working-directory: budgetvault/android
        run: ./gradlew assembleRelease --no-daemon -x lint
        env:
          # Keep Gradle's memory in check on the hosted runner.
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx3g -Dorg.gradle.daemon=false'

      - name: Locate built APK
        id: apk
        run: |
          path="$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)"
          echo "Found APK: $path"
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: budgetvault-apk
          path: budgetvault/${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Publish APK to a GitHub Release
        if: ${{ github.event.inputs.publish_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="test-$(git rev-parse --short HEAD)"
          gh release create "$tag" "${{ steps.apk.outputs.path }}" \
            --title "BudgetVault test build ($tag)" \
            --notes "Internal Android test build. Debug-signed — sideload only, not for store release. DB is currently plaintext; use sample data only." \
            --target "${{ github.event.inputs.ref }}" \
          || gh release upload "$tag" "${{ steps.apk.outputs.path }}" --clobber
