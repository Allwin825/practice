name: CI

on:
  push:
    branches: [main]
    paths:
      - 'budgetvault/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'budgetvault/**'
      - '.github/workflows/ci.yml'

jobs:
  lint-test:
    name: Typecheck · Privacy · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: budgetvault

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: budgetvault/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Privacy check (no network calls in src/ or app/)
        run: bash scripts/check-privacy.sh

      - name: Unit + integration tests
        run: npx jest --no-coverage --ci

      - name: Tests with coverage
        run: npx jest --coverage --ci
        env:
          CI: true
